# ======================================
# DEVELOPMENT PROFILE CONFIGURATION
# ======================================

# ============ H2 Database ============
spring.datasource.url=jdbc:h2:mem:devicemanagerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============ H2 Console ============
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============ JPA/Hibernate ============
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============ SQL Initialization ============
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# ============ Security / OAuth2 ============
security.client-id=myclientid
security.client-secret=myclientsecret
security.jwt.duration=86400

# ============ CORS ============
cors.origins=http://localhost:3000,http://localhost:4200,http://localhost:8080

# ============ Logging ============
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.br.com.zemtech.devicemanager=DEBUG

# ============ Server ============
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=on_param